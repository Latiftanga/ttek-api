version: "3.9"

services:

  # ── Nginx reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - sis-net
    restart: unless-stopped

  # ── Next.js frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    networks:
      - sis-net
    restart: unless-stopped

  # ── FastAPI backend ───────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/api:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      couchdb:
        condition: service_healthy
    networks:
      - sis-net
    restart: unless-stopped

  # ── Celery worker ─────────────────────────────────────────────
  worker:
    build:
      context: ./services/api
      dockerfile: Dockerfile.dev
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./services/api:/app
    env_file:
      - .env
    depends_on:
      - api
      - redis
    networks:
      - sis-net
    restart: unless-stopped

  # ── Celery beat (scheduled tasks) ─────────────────────────────
  beat:
    build:
      context: ./services/api
      dockerfile: Dockerfile.dev
    command: celery -A app.core.celery_app beat --loglevel=info
    volumes:
      - ./services/api:/app
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - sis-net
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sis-net
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sis-net
    restart: unless-stopped

  # ── CouchDB (offline sync) ────────────────────────────────────
  couchdb:
    image: couchdb:3.3
    environment:
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
    volumes:
      - couchdb_data:/opt/couchdb/data
    ports:
      - "5984:5984"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5984/_up"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sis-net
    restart: unless-stopped

  # ── MinIO (file storage) ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - sis-net
    restart: unless-stopped

networks:
  sis-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  couchdb_data:
  minio_data:
